<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADAM — THE WOLF | Prospect List</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0a0a0a;
      --blue: #3B82F6;
      --blue-dark: #1d4ed8;
      --blue-glow: rgba(59,130,246,0.35);
      --silver: #E5E7EB;
      --silver-dim: #9CA3AF;
      --card-bg: #111827;
      --card-border: rgba(59,130,246,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--black);
      color: var(--silver);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Canvas background ── */
    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── City skyline ── */
    .skyline {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.07;
    }

    /* ── Floating hustle words ── */
    .hustle-words {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .hustle-word {
      position: absolute;
      font-family: 'Bangers', cursive;
      font-size: clamp(12px, 2vw, 22px);
      color: var(--blue);
      opacity: 0;
      white-space: nowrap;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--blue);
      animation: floatWord linear infinite;
    }

    @keyframes floatWord {
      0%   { transform: translateY(110vh) rotate(-5deg); opacity: 0; }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(5deg); opacity: 0; }
    }

    /* ── Layout wrapper ── */
    .wrapper {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── HERO ── */
    .hero {
      padding: 60px 0 40px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: #fff;
      font-family: 'Bangers', cursive;
      font-size: 18px;
      letter-spacing: 3px;
      padding: 8px 28px;
      border-radius: 4px;
      border: 1px solid var(--blue);
      box-shadow: 0 0 20px var(--blue-glow);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(52px, 9vw, 110px);
      letter-spacing: 6px;
      color: var(--silver);
      line-height: 1;
      text-shadow: 0 0 40px rgba(59,130,246,0.3);
      margin-bottom: 12px;
    }
    .hero h1 .blue { color: var(--blue); text-shadow: 0 0 30px var(--blue); }

    .hero-sub {
      font-size: 16px;
      color: var(--silver-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .tagline {
      font-family: 'Bangers', cursive;
      font-size: clamp(20px, 3.5vw, 36px);
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }
    .tagline .money { color: #22c55e; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .stat-pill {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 700;
      color: var(--silver);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .stat-pill span { color: var(--blue); }

    /* ── SVG Characters ── */
    .characters {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 40px;
      margin-bottom: 20px;
    }
    .character { text-align: center; }
    .character svg { display: block; margin: 0 auto 8px; }
    .char-label {
      font-family: 'Bangers', cursive;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--blue);
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      margin: 0 0 32px;
      box-shadow: 0 0 12px var(--blue-glow);
    }

    /* ── Search + filters ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 28px;
    }
    .search-box {
      flex: 1;
      min-width: 220px;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--silver);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box::placeholder { color: var(--silver-dim); }
    .search-box:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    .filter-btn {
      background: transparent;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      padding: 10px 18px;
      color: var(--silver-dim);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      box-shadow: 0 0 14px var(--blue-glow);
    }
    .filter-btn.hot.active  { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 14px rgba(239,68,68,0.4); }
    .filter-btn.warm.active { background: #f97316; border-color: #f97316; box-shadow: 0 0 14px rgba(249,115,22,0.4); }
    .filter-btn.mild.active { background: #eab308; border-color: #eab308; color: #000; box-shadow: 0 0 14px rgba(234,179,8,0.4); }
    .filter-btn.cold.active { background: #6b7280; border-color: #6b7280; box-shadow: 0 0 14px rgba(107,114,128,0.4); }

    /* ── Count label ── */
    .count-label {
      font-family: 'Bangers', cursive;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--silver-dim);
      margin-bottom: 14px;
    }
    .count-label span { color: var(--blue); }

    /* ── Prospect grid ── */
    .prospect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px var(--blue-glow);
      border-color: var(--blue);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 10px 0 0 10px;
    }
    .card.temp-hot::before   { background: #ef4444; }
    .card.temp-warm::before  { background: #f97316; }
    .card.temp-mild::before  { background: #eab308; }
    .card.temp-cold::before  { background: #6b7280; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .card-name {
      font-family: 'Bangers', cursive;
      font-size: 19px;
      letter-spacing: 1.5px;
      color: #fff;
      line-height: 1.2;
    }
    .temp-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .temp-hot  .temp-badge { background: rgba(239,68,68,0.2);  color: #ef4444;  border: 1px solid rgba(239,68,68,0.4);  }
    .temp-warm .temp-badge { background: rgba(249,115,22,0.2); color: #f97316; border: 1px solid rgba(249,115,22,0.4); }
    .temp-mild .temp-badge { background: rgba(234,179,8,0.2);  color: #eab308; border: 1px solid rgba(234,179,8,0.4);  }
    .temp-cold .temp-badge { background: rgba(107,114,128,0.2);color: #9CA3AF; border: 1px solid rgba(107,114,128,0.4); }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--silver-dim);
    }
    .meta-row .icon { font-size: 14px; flex-shrink: 0; }
    .meta-row strong { color: var(--silver); }

    .card-phone {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 1px;
      transition: background 0.18s;
    }
    .card:hover .card-phone {
      background: rgba(59,130,246,0.2);
    }

    /* ── Click burst animation ── */
    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-family: 'Bangers', cursive;
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--blue);
      text-shadow: 0 0 10px var(--blue);
      white-space: nowrap;
      animation: burstAnim 0.9s ease forwards;
      transform-origin: center;
    }
    @keyframes burstAnim {
      0%   { opacity: 1; transform: scale(0.6) translateY(0); }
      40%  { opacity: 1; transform: scale(1.3) translateY(-20px); }
      100% { opacity: 0; transform: scale(1) translateY(-60px); }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding-top: 60px;
      font-family: 'Bangers', cursive;
      font-size: 26px;
      letter-spacing: 4px;
      color: var(--blue);
      text-shadow: 0 0 20px var(--blue-glow);
    }

    @media (max-width: 600px) {
      .prospect-grid { grid-template-columns: 1fr; }
      .characters { gap: 16px; }
    }
  </style>
</head>

/* ── Canvas particle animation ── */
const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.r  = Math.random() * 1.8 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.35;
    this.vy = (Math.random() - 0.5) * 0.35;
    this.a  = Math.random() * 0.45 + 0.05;
    this.type = Math.random() < 0.08 ? "dollar" : "dot";
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw() {
    ctx.globalAlpha = this.a;
    if (this.type === "dollar") {
      ctx.fillStyle = "#22c55e";
      ctx.font = "bold 11px Inter";
      ctx.fillText("$", this.x, this.y);
    } else {
      ctx.fillStyle = "#3B82F6";
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

for (let i = 0; i < 140; i++) particles.push(new Particle());

/* Draw connecting lines between nearby particles */
function drawConnections() {
  const max = 100;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < max) {
        ctx.globalAlpha = (1 - d/max) * 0.06;
        ctx.strokeStyle = "#3B82F6";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  drawConnections();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
